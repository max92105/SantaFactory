<!-- FACTORY PAGE — workforce bar, production-line rail, focused line detail.
     Pick a line on the left; schedule its shifts and watch its flow on the right. -->
<div id="tab-factory" class="tab-panel">
  <div class="factory">
    <!-- Workforce summary + idle capacity by elf type -->
    <div class="workforce-bar">
      <div class="workforce-totals">
        <div class="workforce-stat">
          <span>🧝 Total Elves</span>
          <strong id="totalElves">0</strong>
        </div>
        <div class="workforce-stat highlight">
          <span>On Shift Now</span>
          <strong id="assignedElves">0</strong>
        </div>
        <div class="workforce-stat">
          <span>Idle Elves</span>
          <strong id="unassignedElves">0</strong>
        </div>
      </div>
      <div id="unassignedTypes" class="unassigned-types"></div>
    </div>

    <div class="factory-body">
      <aside class="factory-rail" id="factoryRail"></aside>
      <section class="factory-detail" id="factoryDetail"></section>
    </div>
  </div>
</div>
