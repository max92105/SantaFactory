<!-- FACTORY PAGE — workforce overview, production pipeline, work-in-progress -->
<div id="tab-factory" class="tab-panel">
  <div class="factory-layout">
    <!-- Workforce Overview -->
    <div class="panel workforce-panel">
      <div class="panel-header">
        <h3 class="panel-title">👷 Workforce</h3>
      </div>
      <div class="workforce-stats">
        <div class="workforce-stat">
          <span>Total Elves</span>
          <strong id="totalElves">0</strong>
        </div>
        <div class="workforce-stat highlight">
          <span>Unassigned</span>
          <strong id="unassignedElves">0</strong>
        </div>
      </div>
    </div>

    <!-- Production Pipeline -->
    <div class="panel pipeline-panel">
      <div class="panel-header">
        <h3 class="panel-title">⚙️ Production Pipeline</h3>
      </div>
      <div id="pipelineList" class="pipeline-list"></div>
    </div>

    <!-- Intermediate Resources -->
    <div class="panel materials-panel">
      <div class="panel-header">
        <h3 class="panel-title">📦 Work in Progress</h3>
      </div>
      <div id="wipGrid" class="materials-grid"></div>
    </div>
  </div>
</div>
