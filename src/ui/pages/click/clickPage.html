<!-- CLICK PAGE — hand-craft gifts. Hero button + scalable toy tray (no boxes) -->
<div id="tab-click" class="tab-panel active">
  <div class="click-page">
    <!-- Hero: the big craft button + what you're crafting -->
    <div class="click-hero">
      <div class="click-area">
        <button id="makeGiftBtn" class="click-btn" aria-label="Craft gift">🎁</button>
        <div id="floatLayer" class="float-layer"></div>
      </div>

      <div class="click-selected">
        <span class="click-toy-name" id="clickToyName">Plushy</span>
        <span class="click-toy-value" id="clickToyValue">$3.00 each</span>
      </div>

      <div class="click-stats">
        <span class="click-stat"><span class="click-stat-icon">⚡</span><strong id="clickGpc">1</strong> per click</span>
        <span class="click-stat-sep">·</span>
        <span class="click-stat"><span class="click-stat-icon">📦</span><strong id="clickStock">0</strong> in stock</span>
      </div>
    </div>

    <!-- Make Gifts: pick which toy the button crafts. Scrolls for many toys. -->
    <div class="click-selector">
      <h2 class="click-title">Make Gifts</h2>
      <div id="clickToySelector" class="toy-tray"></div>
    </div>
  </div>
</div>
