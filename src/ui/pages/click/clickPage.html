<!-- CLICK PAGE — hand-craft gifts by clicking (bootstrap production) -->
<div id="tab-click" class="tab-panel active">
  <div class="click-container">
    <div class="click-card">
      <h2 class="click-title">Make Gifts</h2>
      <p class="click-desc">Click to craft gifts by hand</p>

      <div id="clickToySelector" class="click-toy-selector"></div>

      <div class="click-area">
        <button id="makeGiftBtn" class="click-btn" aria-label="Make Gift">
          🎁
        </button>
        <div id="floatLayer" class="float-layer"></div>
      </div>

      <div class="click-stats">
        <div class="click-stat">
          <span>Per Click</span>
          <strong id="clickGpc">1</strong>
        </div>
      </div>
    </div>
  </div>
</div>
