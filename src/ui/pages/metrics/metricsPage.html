<!-- METRICS PAGE — production, economy, lifetime and wage statistics -->
<div id="tab-metrics" class="tab-panel">
  <div class="metrics-layout">
    <!-- Production Metrics -->
    <div class="panel">
      <div class="panel-header">
        <h3 class="panel-title">📈 Production</h3>
      </div>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Gifts per Click</span>
          <strong class="metric-value" id="mGpc">1</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Pipeline Output</span>
          <strong class="metric-value" id="mGps">—</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Sell Rate</span>
          <strong class="metric-value" id="mSellRate">$1.00</strong>
        </div>
      </div>
    </div>

    <!-- Economy Metrics -->
    <div class="panel">
      <div class="panel-header">
        <h3 class="panel-title">💰 Economy</h3>
      </div>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Current Gifts</span>
          <strong class="metric-value" id="mGifts">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Current Money</span>
          <strong class="metric-value" id="mMoney">$0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Net Worth</span>
          <strong class="metric-value" id="mNetWorth">$0.00</strong>
        </div>
      </div>
    </div>

    <!-- Lifetime Stats -->
    <div class="panel">
      <div class="panel-header">
        <h3 class="panel-title">🏆 Lifetime</h3>
      </div>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Total Gifts Made</span>
          <strong class="metric-value" id="mLifetimeGifts">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Total Gifts Sold</span>
          <strong class="metric-value" id="mLifetimeSold">0</strong>
        </div>
      </div>
    </div>

    <!-- Wages -->
    <div class="panel">
      <div class="panel-header">
        <h3 class="panel-title">💸 Wages</h3>
      </div>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Wages Due (End of Day)</span>
          <strong class="metric-value" id="mWagesDue">$0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Last Wage Result</span>
          <strong class="metric-value" id="mWageResult">—</strong>
        </div>
      </div>
      <div class="wage-warning">
        <span class="warning-icon">⚠️</span>
        <span id="wageRuleText">If you can't pay wages, you lose elves.</span>
      </div>
    </div>
  </div>
</div>
