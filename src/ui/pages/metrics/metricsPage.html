<!-- METRICS PAGE — today, production, economy, lifetime and wage statistics -->
<div id="tab-metrics" class="tab-panel">
  <div class="metrics-layout">
    <!-- Today -->
    <section class="metrics-panel">
      <h3 class="section-title">Today</h3>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Gifts Made</span>
          <strong class="metric-value" id="mDayMade">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Gifts Sold</span>
          <strong class="metric-value" id="mDaySold">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Money Earned</span>
          <strong class="metric-value" id="mDayEarned">$0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Wages Due Tonight</span>
          <strong class="metric-value" id="mWagesDue">$0</strong>
        </div>
      </div>
    </section>

    <!-- Production -->
    <section class="metrics-panel">
      <h3 class="section-title">Production</h3>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Gifts per Click</span>
          <strong class="metric-value" id="mGpc">1</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Pipeline Output</span>
          <strong class="metric-value" id="mGps">0/s</strong>
        </div>
      </div>
    </section>

    <!-- Economy -->
    <section class="metrics-panel">
      <h3 class="section-title">Economy</h3>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Gifts in Stock</span>
          <strong class="metric-value" id="mGifts">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Money</span>
          <strong class="metric-value" id="mMoney">$0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Net Worth</span>
          <strong class="metric-value" id="mNetWorth">$0.00</strong>
        </div>
      </div>
      <div id="mSellRates" class="sell-rates-list"></div>
    </section>

    <!-- Lifetime -->
    <section class="metrics-panel">
      <h3 class="section-title">Lifetime</h3>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Total Gifts Made</span>
          <strong class="metric-value" id="mLifetimeGifts">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Total Gifts Sold</span>
          <strong class="metric-value" id="mLifetimeSold">0</strong>
        </div>
      </div>
    </section>

    <!-- Wages -->
    <section class="metrics-panel metrics-panel-wide">
      <h3 class="section-title">Wages</h3>
      <div class="metrics-grid">
        <div class="metric">
          <span class="metric-label">Last Wage Result</span>
          <strong class="metric-value" id="mWageResult">—</strong>
        </div>
      </div>
      <div class="wage-warning">
        <span class="warning-icon">⚠️</span>
        <span id="wageRuleText">If you can't pay wages, you lose elves.</span>
      </div>
    </section>
  </div>
</div>
