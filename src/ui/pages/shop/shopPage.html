<!-- UPGRADES PAGE (internal id "shop") — new toys, hiring, upgrades -->
<div id="tab-shop" class="tab-panel">
  <div class="shop-layout">
    <!-- Section nav — add more sections here when needed -->
    <nav class="shop-nav">
      <button class="shop-tab active" data-shop="toys">🧸 New Toys</button>
      <button class="shop-tab" data-shop="hiring">🧝 Hiring</button>
      <button class="shop-tab" data-shop="upgrades">⬆️ Upgrades</button>
    </nav>

    <!-- New Toys -->
    <section id="shop-toys" class="shop-section active">
      <p class="section-desc">Unlock new toy lines for your factory to produce and sell.</p>
      <div id="toysList" class="shop-list"></div>
    </section>

    <!-- Hiring -->
    <section id="shop-hiring" class="shop-section">
      <p class="section-desc">Expand your workforce. Hiring costs follow the elves you currently employ.</p>
      <div id="producersList" class="shop-list"></div>
    </section>

    <!-- Upgrades -->
    <section id="shop-upgrades" class="shop-section">
      <p class="section-desc">Permanent improvements to your factory.</p>
      <div id="upgradesList" class="shop-list"></div>
    </section>
  </div>
</div>
