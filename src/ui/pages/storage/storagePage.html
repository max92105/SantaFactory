<!-- STORAGE PAGE — one unified, searchable inventory+sell list (scales to
     many toys). Each row shows stock, rate, value and per-row sell actions. -->
<div id="tab-storage" class="tab-panel">
  <div class="storage">
    <!-- Toolbar: totals + search + sell-all -->
    <div class="storage-head">
      <div class="storage-summary">
        <div class="sum">
          <span data-i18n="storage.totalStock">Gifts in stock</span>
          <strong id="storageTotalStock">0</strong>
        </div>
        <div class="sum sum-value">
          <span data-i18n="storage.totalValue">Total value</span>
          <strong id="storageTotalValue">$0.00</strong>
        </div>
        <div class="sum sum-broken">
          <span data-i18n="storage.totalBroken">Broken</span>
          <strong id="storageTotalBroken">0</strong>
        </div>
      </div>
      <div class="storage-tools">
        <input id="storageSearch" class="storage-search" type="search" data-i18n-ph="storage.search" placeholder="Search toys…" autocomplete="off" />
        <div class="sell-all-wrap">
          <button id="sellAllBtn" class="sell-all-btn" data-i18n="storage.sellAll">💵 Sell all gifts</button>
          <div id="sellFloatLayer" class="sell-float-layer"></div>
        </div>
      </div>
    </div>

    <!-- One row per unlocked toy (built in storagePage.ts) -->
    <div id="storageList" class="stock-list"></div>
    <div id="storageEmpty" class="storage-empty" hidden data-i18n="storage.empty">No matches.</div>
  </div>
</div>
