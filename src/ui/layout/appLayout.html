<!-- APP LAYOUT: game HUD (menu / brand / resource chips / season clock)   -->
<!-- + tab nav + footer. Pages mount into #tabContent by core/Game.ts.     -->
<!-- ════════════════════════════════════════════════════════════════════ -->
<header class="hud">
  <!-- Brand + menu -->
  <div class="hud-brand">
    <div class="menu">
      <button id="menuBtn" class="menu-btn" aria-label="Menu">☰</button>
      <div id="menuPanel" class="menu-panel hidden">
        <button id="saveBtn" class="menu-item" data-i18n="menu.save">💾 Save now</button>
        <button id="muteBtn" class="menu-item">🔊 Music: on</button>
        <button id="mainMenuBtn" class="menu-item" data-i18n="menu.mainMenu">🏠 Main menu</button>
        <div class="menu-lang">
          <span class="menu-lang-label" data-i18n="menu.language">Language</span>
          <span id="langSelect"></span>
        </div>
      </div>
    </div>
    <span class="brand-icon">🎅</span>
    <div class="brand-text">
      <div class="brand-title">Santa Factory</div>
      <div class="brand-sub" data-i18n="hud.brandSub">Elf Manager</div>
    </div>
  </div>

  <!-- Resources: plain icon + label + value (no boxes). All share a main row
       + a foot row so Gifts / Money / Elves stay aligned; only Gifts' foot
       holds the clickable breakdown arrow. -->
  <div class="hud-resources">
    <div class="res res-gifts" id="giftsResource">
      <div class="res-main">
        <span class="res-icon">🎁</span>
        <div class="res-info">
          <span class="res-label" data-i18n="hud.gifts">Gifts</span>
          <strong class="res-value" id="hudGifts">0</strong>
        </div>
      </div>
      <div class="res-foot">
        <button class="res-arrow" id="giftsToggle" aria-label="Show gift breakdown" aria-expanded="false">
          <span class="res-arrow-chev" aria-hidden="true">▾</span>
        </button>
      </div>
      <div class="resource-dropdown" id="giftsDropdown"></div>
    </div>

    <div class="res res-money">
      <div class="res-main">
        <span class="res-icon">💰</span>
        <div class="res-info">
          <span class="res-label" data-i18n="hud.money">Money</span>
          <strong class="res-value" id="hudMoney">$0</strong>
        </div>
      </div>
      <div class="res-foot"></div>
    </div>

    <div class="res res-elves" id="elvesResource">
      <div class="res-main">
        <span class="res-icon">🧝</span>
        <div class="res-info">
          <span class="res-label" data-i18n="hud.elves">Elves</span>
          <strong class="res-value" id="hudElves">0</strong>
        </div>
      </div>
      <div class="res-foot">
        <button class="res-arrow" id="elvesToggle" aria-label="Show elf breakdown" aria-expanded="false">
          <span class="res-arrow-chev" aria-hidden="true">▾</span>
        </button>
      </div>
      <div class="resource-dropdown" id="elvesDropdown"></div>
    </div>
  </div>

  <!-- Season clock: time-of-day, day, countdown to Christmas (no box) -->
  <div class="hud-season">
    <span class="season-icon" id="hudTimeIcon">🌅</span>
    <div class="season-info">
      <span class="season-day"><span data-i18n="clock.day">Day</span> <strong id="hudDay">1</strong> <span class="season-total">/ 365</span> · <span id="hudTimeOfDay" class="season-tod">Morning</span></span>
      <div class="season-progress">
        <div id="timeBarFill" class="season-progress-fill"></div>
      </div>
    </div>
    <div class="season-countdown" title="Days until Christmas">
      <span class="countdown-num" id="hudDaysLeft">364</span>
      <span class="countdown-label" data-i18n="clock.toGo">🎄 to go</span>
    </div>
  </div>
</header>

<main class="main-content">
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="click"><span data-i18n="tab.click">🖱️ Click</span></button>
    <button class="tab-btn" data-tab="factory"><span data-i18n="tab.factory">🏭 Factory</span><span id="factoryBadge" class="tab-badge" hidden>0</span></button>
    <button class="tab-btn" data-tab="shop"><span data-i18n="tab.upgrades">🛠️ Upgrades</span></button>
    <button class="tab-btn" data-tab="storage"><span data-i18n="tab.storage">📦 Storage</span></button>
    <button class="tab-btn" data-tab="orders"><span data-i18n="tab.orders">📋 Orders</span><span id="ordersBadge" class="tab-badge" hidden>0</span></button>
    <button class="tab-btn" data-tab="metrics"><span data-i18n="tab.metrics">📊 Metrics</span></button>
  </nav>

  <!-- Each page (ui/pages/*) mounts its panel here -->
  <div id="tabContent" class="tab-content"></div>
</main>

<footer class="footer">
  <span class="status-label" data-i18n="footer.status">Status:</span>
  <span id="statusText" class="status-text">Ready.</span>
</footer>

<!-- Corner notifications (station breakdowns, etc.) -->
<div id="toastLayer" class="toast-layer"></div>

<!-- Full-screen celebration effects (confetti, payout pops, golden flash) -->
<div id="fxLayer" class="fx-layer"></div>
